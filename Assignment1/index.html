<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Event Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">🎯 Smart Event Dashboard</h1>

    <div class="container">

        <!-- Add New Event Card -->
        <div class="card">
            <h2>Add New Event</h2>

            <label>Event Title:</label>
            <input type="text" placeholder="Enter event title">

            <label>Event Date:</label>
            <input type="date">

            <label>Category:</label>
            <select>
                <option>Conference</option>
                <option>Workshop</option>
                <option>Meeting</option>
                <option>Personal</option>
                <option>Other</option>
            </select>

            <label>Description:</label>
            <textarea placeholder="Enter description"></textarea>

            <button class="btn primary">Add Event</button>
        </div>

        <!-- My Events Card -->
        <div class="card large">
            <h2>My Events</h2>

            <div class="btn-group">
                <button class="btn secondary">Clear All Events</button>
                <button class="btn secondary">Add Sample Events</button>
            </div>

            <p class="empty-text">No events yet. Add your first event!</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
